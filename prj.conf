# System and Logging
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BACKEND_SWO=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=100
CONFIG_LOG_MODE_DEFERRED=y

# Support for float values in printf/logging
CONFIG_CBPRINTF_FP_SUPPORT=y

# C++ Support for Arduino Libraries
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBC=y

# Bluetooth Stack
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CONN=y
CONFIG_BT_DEVICE_NAME="CPAP-PI-Portal"
CONFIG_BT_DEVICE_APPEARANCE=833
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_SMP=y
CONFIG_BT_SETTINGS=y

# Nordic UART Service (NUS)
CONFIG_BT_NUS=y
CONFIG_BT_L2CAP_DYNAMIC_CHANNEL=y

# Increase stack size for BLE
CONFIG_BT_RX_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Hardware Subsystems
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_DK_LIBRARY=y

# Disable Zephyr's internal MAX30101 driver so we can use EmotiBit's C++ library
# CONFIG_MAX30101=y
# CONFIG_MAX30101_TRIGGER_GLOBAL_THREAD=y

# TCA9548A MUX Initialization Priorities (must be > I2C_INIT_PRIORITY)
CONFIG_I2C_TCA954X_ROOT_INIT_PRIO=60
CONFIG_I2C_TCA954X_CHANNEL_INIT_PRIO=70
