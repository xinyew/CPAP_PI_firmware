CONFIG_PRINTK=y
CONFIG_LOG=y

CONFIG_I2C=y
CONFIG_ADC=y

# TCA9548A mux: channel buses must init after the root mux, which must
# init after the underlying I2C controller (I2C_INIT_PRIORITY = 50)
CONFIG_I2C_TCA954X_ROOT_INIT_PRIO=60
CONFIG_I2C_TCA954X_CHANNEL_INIT_PRIO=70

# In-tree sensor drivers: MAX30101 x3 (configures mode + LED currents at
# init -> LEDs light up) and SHT4x. Sensor devices must init after the
# mux channel buses (prio 70).
CONFIG_SENSOR=y
CONFIG_SENSOR_INIT_PRIORITY=80
CONFIG_MAX30101=y
CONFIG_SHT4X=y

CONFIG_MYFUNC=n



# BLE — peripheral, Nordic UART Service (NUS) sensor stream
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="CPAP_PI_Control"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_NUS=y

# Throughput: DLE 251 + MTU 247 so a 176 B DATA frame fits one
# notification (see src/comm/comm_protocol.h and README BLE budget)
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_DATA_LEN_UPDATE=y
CONFIG_BT_AUTO_DATA_LEN_UPDATE=y
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_BUF_EVT_RX_COUNT=20
CONFIG_BT_CONN_TX_MAX=10
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y

# Increase stacks for BLE workqueue traffic
CONFIG_BT_RX_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
