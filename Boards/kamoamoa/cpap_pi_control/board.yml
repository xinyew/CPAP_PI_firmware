board:
  name: cpap_pi_control
  full_name: CPAP PI Sensor Control Board
  vendor: kamoamoa
  socs:
    - name: nrf52840

runners:
  run_once:
    '--recover':
      - runners:
          - nrfutil
        run: first
        groups:
          - boards:
              - cpap_pi_control/nrf52840
    '--erase':
      - runners:
          - jlink
          - nrfutil
        run: first
        groups:
          - boards:
              - cpap_pi_control/nrf52840
    '--reset':
      - runners:
          - jlink
          - nrfutil
        run: last
        groups:
          - boards:
              - cpap_pi_control/nrf52840
